name: Build executables
on:
  release:
    types: [published]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build exe
        run: pyinstaller --onefile --windowed --add-data "*.py;." mision_numerologica_gui.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: numerologia-windows
          path: dist/mision_numerologica_gui.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install system dependencies (Tkinter)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build executable
        run: pyinstaller --onefile --windowed mision_numerologica_gui.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: numerologia-linux
          path: dist/mision_numerologica_gui